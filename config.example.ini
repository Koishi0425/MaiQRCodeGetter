[Default]
# ============================================================
# MaiQRCodeGetter 配置文件模板
# 使用前请复制此文件为 config.ini 并修改下方配置项
# ============================================================

# 登录页面入口，建议修改为非默认值以防非法登录
entryPoint = /login

# 登录用户名
loginUserName = admin

# 登录密码，务必修改为强密码！
loginPassword = maimaidx

# 监听端口 (1-65535)
port = 8080

# 等待时间 (秒)，高峰期可能响应较慢，建议设置为15秒
waitTime = 15

# 获取到二维码后是否最小化微信窗口，0为不启用，1为启用
minimize_after_success = 0

# CapJS 验证码 API 地址，留空则不启用验证码
# 启用方法请参考 README.md 中的 "增加登录安全性" 章节
capjs_endpoint =

# 运行模式 (四选一):
#   normal  - 正常模式，真实二维码，完整输出
#   marked  - 隐藏模式，真实二维码但日志中打码显示（防截屏泄露）
#   demo    - 演示模式，基于真实二维码哈希生成假码，无法登录
#   web_only - 纯演示模式，随机生成假码，完全脱离微信
mode = normal

# SSL 证书文件名（如需启用 HTTPS，请放置证书文件并填写路径）
certfile = server.crt

# SSL 密钥文件名
keyfile = server.key

# ============================================================
# 以下选项仅在使用 main_proxy.py（代理模式）时需要
# ============================================================

# 代理监听端口，不可与上方 port 相同！(1-65535)
proxyPort = 8081
