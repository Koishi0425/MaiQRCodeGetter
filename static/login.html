<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon-192.svg">
    <script src="/static/js/fp.min.js"></script>
    <!-- CAP Worker Js Replace -->
    <title>登录 - MaiQR</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;height:100dvh;overflow:hidden}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
            background:#d3d3d3;
            color:#333;
        }
        #container{
            display:flex;
            justify-content:center;
            width:100%;
            height:100%;
            height:100dvh;
            padding:clamp(8px,2vw,24px);
            overflow-y:auto;
            overflow-x:hidden;
            -webkit-overflow-scrolling:touch;
        }
        .card{
            display:flex;
            flex-direction:column;
            width:100%;
            max-width:400px;
            gap:clamp(12px,2.5vh,24px);
            margin:auto 0;
            padding:clamp(20px,5vw,36px);
            background:#fff;
            border-radius:12px;
            box-shadow:0 2px 16px rgba(0,0,0,0.08);
        }
        /* 标题 */
        .card-header{text-align:center}
        .card-header h1{
            font-size:clamp(18px,4vw,24px);
            font-weight:700;
            color:#333;
        }
        .card-header p{
            font-size:clamp(12px,2.5vw,14px);
            color:#888;
            margin-top:clamp(2px,0.5vh,6px);
        }
        /* 表单 */
        .form-group{margin-bottom:clamp(10px,2vh,18px)}
        .form-group label{
            display:block;
            margin-bottom:clamp(3px,0.6vh,6px);
            font-size:clamp(13px,2.8vw,15px);
            font-weight:500;
            color:#444;
        }
        .form-group input{
            width:100%;
            padding:clamp(10px,2vw,12px);
            border:1px solid #ddd;
            border-radius:8px;
            font-size:max(16px,clamp(14px,3vw,16px));
            color:#333;
            background:#fafafa;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .form-group input:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 0 3px rgba(102,126,234,0.15);
            background:#fff;
        }
        .form-group.error input{
            border-color:#e74c3c;
            box-shadow:0 0 0 3px rgba(231,76,60,0.1);
        }
        .field-error{
            display:none;
            color:#e74c3c;
            font-size:clamp(11px,2.2vw,13px);
            margin-top:4px;
        }
        .form-group.error .field-error{display:block}
        /* 全局错误横幅 */
        .alert{
            display:none;
            padding:clamp(8px,1.5vw,12px);
            border-radius:8px;
            font-size:clamp(12px,2.5vw,14px);
            text-align:center;
            line-height:1.4;
        }
        .alert.show{display:block}
        .alert-error{background:#fff0f0;color:#c62828;border:1px solid #ffcdd2}
        /* 登录按钮 */
        .btn-login{
            width:100%;
            padding:clamp(10px,2vw,12px);
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:clamp(15px,3vw,16px);
            font-weight:600;
            cursor:pointer;
            transition:opacity 0.2s,transform 0.1s;
            min-height:clamp(40px,7vh,48px);
            -webkit-tap-highlight-color:transparent;
            margin-top:clamp(4px,1vh,8px);
        }
        .btn-login:active{transform:scale(0.97)}
        .btn-login:hover:not(:disabled){opacity:0.9}
        .btn-login:disabled{opacity:0.55;cursor:not-allowed;transform:none}
        /* 加载 */
        .loading-row{
            display:none;
            align-items:center;
            justify-content:center;
            gap:10px;
            margin-top:clamp(8px,1.5vh,14px);
            font-size:clamp(12px,2.5vw,14px);
            color:#888;
        }
        .loading-row.show{display:flex}
        .spinner-sm{
            width:20px;height:20px;
            border:2.5px solid #e0e0e0;
            border-top:2.5px solid #667eea;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        /* 底部 */
        .card-footer{
            text-align:center;
            font-size:clamp(10px,2vw,12px);
            color:#aaa;
        }
        cap-widget{--cap-widget-width:100%}

        /* ====== 窄屏 ====== */
        @media (max-width:319px){
            .card{padding:14px;gap:8px;border-radius:8px}
            .card-header h1{font-size:16px}
            .form-group input{padding:8px 10px}
            .btn-login{min-height:36px;font-size:14px;padding:8px}
        }
        /* ====== 矮屏 ====== */
        @media (max-height:399px){
            #container{padding:4px 8px}
            .card{padding:10px 14px;gap:6px;border-radius:8px}
            .card-header h1{font-size:14px}
            .card-header p{font-size:10px;margin-top:1px}
            .form-group{margin-bottom:5px}
            .form-group label{font-size:11px;margin-bottom:1px}
            .form-group input{padding:5px 8px;font-size:16px}
            .btn-login{min-height:28px;font-size:13px;padding:5px}
            .alert{padding:5px 8px;font-size:10px}
            .card-footer{font-size:9px}
        }
        /* ====== 横屏 ====== */
        @media (max-width:600px) and (orientation:landscape){
            .card{max-width:500px;padding:14px 18px;gap:8px}
            .card-header{margin-bottom:0}
            .card-header h1{font-size:clamp(15px,3vw,20px)}
            .form-group{margin-bottom:6px}
        }
        /* ====== 大屏 ====== */
        @media (min-width:769px){
            .card{padding:40px}
        }
    </style>
</head>
<body>

<div id="container">
    <div class="card">
        <div class="card-header">
            <h1>MaiQR</h1>
            <p>舞萌二维码获取工具</p>
        </div>

        <form id="loginForm">
            <!-- 全局错误信息 -->
            <div id="alertError" class="alert alert-error"></div>

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" inputmode="text" enterkeyhint="next">
                <div class="field-error">请输入用户名</div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" inputmode="text" enterkeyhint="go">
                <div class="field-error">请输入密码</div>
            </div>

            <!-- cap-widget -->

            <button type="submit" class="btn-login" id="loginButton">登录</button>

            <div class="loading-row" id="loadingRow">
                <div class="spinner-sm"></div>
                <span>正在登录...</span>
            </div>
        </form>

        <div class="card-footer">MaiQR v1.0</div>
    </div>
</div>

<script>
    window.CAP_CUSTOM_WASM_URL = "https://cdn.iocdn.cc/npm/@cap.js/wasm@0.0.4/browser/cap_wasm.min.js";
    var cap_token = "";
    var cap_widget = document.querySelector("#cap");
    var loginBtn = document.getElementById("loginButton");
    var alertEl  = document.getElementById("alertError");
    var loadingRow = document.getElementById("loadingRow");

    if (cap_widget) {
        loginBtn.disabled = true;
        loginBtn.innerText = '请先完成验证码';
        cap_widget.addEventListener("solve", function(e) {
            cap_token = e.detail.token;
            loginBtn.disabled = false;
            loginBtn.innerText = '登录';
        });
        cap_widget.addEventListener("error", function() {
            loginBtn.disabled = true;
            loginBtn.innerText = '验证失败，请重试';
            setTimeout(function() {
                cap_widget.reset();
                loginBtn.innerText = '请先完成验证码';
            }, 2000);
        });
    }

    function showError(msg) {
        alertEl.textContent = msg;
        alertEl.classList.add('show');
    }
    function hideError() {
        alertEl.classList.remove('show');
    }

    async function getFingerprint() {
        var result = await FingerprintJS.load();
        var visitorId = await result.get();
        return visitorId.visitorId;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var groups = document.querySelectorAll('.form-group');

        groups.forEach(function(g){ g.classList.remove('error'); });

        var hasError = false;
        if (!username) {
            document.querySelector('.form-group:nth-child(2)').classList.add('error');
            hasError = true;
        }
        if (!password) {
            document.querySelector('.form-group:nth-child(3)').classList.add('error');
            hasError = true;
        }
        if (hasError) return;

        loadingRow.classList.add('show');
        loginBtn.disabled = true;

        try {
            var formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('fp', await getFingerprint());
            if (cap_token) formData.append('token', cap_token);

            var resp = await fetch(window.location.pathname, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'application/json'
                }
            });

            var data = await resp.json();

            if (data.success) {
                loginBtn.innerText = '登录成功，正在跳转...';
                window.location.href = data.redirect || '/';
            } else {
                showError(data.error || '登录失败，请检查用户名和密码');
                if (cap_widget) {
                    cap_widget.reset();
                    loginBtn.disabled = true;
                    loginBtn.innerText = '请先完成验证码';
                    cap_token = "";
                }
            }
        } catch (err) {
            showError('网络错误，请检查连接后重试');
            if (cap_widget) {
                cap_widget.reset();
                loginBtn.disabled = true;
                loginBtn.innerText = '请先完成验证码';
                cap_token = "";
            }
        } finally {
            loadingRow.classList.remove('show');
            if (!cap_widget) loginBtn.disabled = false;
        }
    });

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });

    // ====== Service Worker ======
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
    }
</script>

</body>
</html>
