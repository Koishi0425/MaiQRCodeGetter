<!DOCTYPE html>
<html lang="zh-CN" style="height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MaiQR">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icons/icon-192.svg">
<title>MaiQR</title>
<style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{
        height:100%;
        height:100dvh;
        overflow:hidden;
    }
    body{
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
        background:#d3d3d3;
        color:#333;
    }

    /*
     * 关键：滚动容器不使用 align-items:center（会导致顶部内容在溢出时被截断）。
     * 改用 margin:auto 在子元素上实现「有空间时居中，溢出时可滚动到顶部」。
     */
    #container{
        display:flex;
        justify-content:center;
        width:100%;
        height:100%;
        height:100dvh;
        padding:clamp(6px,1.5vw,24px);
        overflow-y:auto;
        overflow-x:hidden;
        -webkit-overflow-scrolling:touch;
    }

    /* ====== 卡片：margin:auto 实现安全居中（溢出时回退到顶部） ====== */
    .card{
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
        max-width:500px;
        gap:clamp(6px,1.5vh,20px);
        text-align:center;
        margin:auto 0;
    }

    /* ====== 状态面板 ====== */
    .state-panel{display:none;width:100%}
    .state-panel.active{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:clamp(6px,1.5vh,20px);
    }

    /* ---------- 加载状态 ---------- */
    .spinner-ring{
        width:clamp(36px,10vw,60px);
        height:clamp(36px,10vw,60px);
        border:4px solid #e0e0e0;
        border-top:4px solid #667eea;
        border-radius:50%;
        animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-title{
        font-size:clamp(15px,3.5vw,22px);
        font-weight:700;
    }
    .loading-hint{
        font-size:clamp(11px,2.5vw,15px);
        color:#888;
    }
    .elapsed{
        font-size:clamp(11px,2.2vw,13px);
        color:#aaa;
        font-variant-numeric:tabular-nums;
    }
    .quote{
        font-size:clamp(11px,2.2vw,14px);
        color:#888;
        font-style:italic;
        max-width:90%;
        line-height:1.5;
        padding:clamp(4px,1vw,8px) clamp(8px,2vw,14px);
        background:rgba(0,0,0,0.03);
        border-radius:6px;
        border-left:3px solid #667eea;
        text-align:left;
    }
    .quote::before{content:'💡 '}

    /* ---------- 成功状态 ---------- */
    #qrCanvasWrap canvas{
        display:block;
        /* 同一个值约束宽高，保证 QR 码始终正方形不压扁 */
        --qr-cap:min(90vw,55vh,55dvh,500px);
        max-width:var(--qr-cap);
        max-height:var(--qr-cap);
        height:auto;
        width:auto;
        image-rendering:crisp-edges;
    }
    .info-line{
        font-size:clamp(11px,2.2vw,15px);
        color:#555;
        line-height:1.4;
        padding:0 8px;
    }
    .info-expiry{
        color:#d31e1e;
        font-size:clamp(12px,2.8vw,20px);
        font-weight:700;
        padding:0 8px;
    }

    /* ---------- 错误状态 ---------- */
    .error-icon{
        font-size:clamp(32px,8vw,60px);
        line-height:1;
    }
    .error-title{
        font-size:clamp(15px,3.5vw,22px);
        font-weight:700;
        color:#c62828;
    }
    /*
     * 关键：错误详情限制最大高度，防止长错误信息撑开页面。
     * 内部可独立滚动，按钮始终可见。
     */
    .error-detail{
        font-size:clamp(11px,2.5vw,15px);
        color:#666;
        max-width:90%;
        word-break:break-word;
        line-height:1.45;
        padding:clamp(6px,1.5vw,14px);
        background:rgba(0,0,0,0.03);
        border-radius:8px;
        /* 限制高度，长文本内部滚动 */
        max-height:min(20vh,20dvh,180px);
        overflow-y:auto;
        -webkit-overflow-scrolling:touch;
    }

    /* ---------- 按钮 ---------- */
    .btn-row{
        display:flex;
        flex-wrap:wrap;
        align-items:center;
        justify-content:center;
        gap:clamp(6px,2vw,16px);
        /* 确保按钮不被压缩 */
        flex-shrink:0;
    }
    .btn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-width:clamp(80px,20vw,120px);
        min-height:clamp(34px,6vh,44px);
        padding:clamp(5px,1.5vw,12px) clamp(10px,3vw,20px);
        font-size:clamp(12px,2.5vw,15px);
        font-weight:600;
        text-decoration:none;
        border:none;
        border-radius:8px;
        cursor:pointer;
        transition:opacity 0.2s,transform 0.1s;
        -webkit-tap-highlight-color:transparent;
        user-select:none;
        -webkit-user-select:none;
        white-space:nowrap;
    }
    .btn:active{transform:scale(0.96)}
    .btn-secondary{background:#eee;color:#666}
    .btn-secondary:hover{background:#ddd}
    .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
    .btn-primary:hover{opacity:0.9}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    /* ========== 极窄屏 (< 320 CSS px 宽) ========== */
    @media (max-width:319px){
        .card{gap:5px}
        .state-panel.active{gap:5px}
        .btn{min-height:30px;font-size:11px;padding:5px 8px;border-radius:6px;min-width:70px}
        #qrCanvasWrap canvas{--qr-cap:min(85vw,40vh,40dvh)}
        .error-detail{max-height:min(18vh,18dvh,120px);font-size:10px}
    }

    /* ========== 矮屏 (< 400 CSS px 高) — 最关键的小屏幕适配 ========== */
    @media (max-height:399px){
        #container{padding:4px 8px}
        .card{gap:4px}
        .state-panel.active{gap:4px}
        .spinner-ring{width:28px;height:28px;border-width:3px}
        .loading-title{font-size:14px}
        .loading-hint{font-size:10px}
        .elapsed{font-size:10px}
        .quote{font-size:10px;padding:3px 6px;border-left-width:2px}
        .error-icon{font-size:26px}
        .error-title{font-size:14px}
        .error-detail{
            font-size:10px;
            padding:5px 8px;
            max-height:min(16vh,16dvh,90px);
            line-height:1.35;
        }
        .info-line{font-size:10px;line-height:1.3}
        .info-expiry{font-size:11px}
        .btn{
            min-height:28px;
            font-size:11px;
            padding:4px 8px;
            border-radius:6px;
            min-width:65px;
        }
        .btn-row{gap:4px}
        #qrCanvasWrap canvas{--qr-cap:min(85vw,35vh,35dvh)}
    }

    /* ========== 矮 + 窄 (< 400px 高 且 < 320px 宽) ========== */
    @media (max-height:399px) and (max-width:319px){
        #container{padding:2px 4px}
        .card{gap:3px}
        .state-panel.active{gap:3px}
        .btn{min-height:26px;font-size:10px;padding:3px 6px;min-width:58px;border-radius:5px}
        #qrCanvasWrap canvas{--qr-cap:min(80vw,30vh,30dvh)}
    }

    /* ========== 横屏小屏幕 ========== */
    @media (max-width:600px) and (orientation:landscape){
        .card{flex-direction:row;flex-wrap:wrap;justify-content:center;max-width:100%}
        .state-panel.active{flex-direction:row;flex-wrap:wrap;justify-content:center}
        #qrCanvasWrap canvas{--qr-cap:min(40vw,80vh,80dvh,400px)}
        .info-line,.info-expiry{max-width:min(40vw,300px)}
    }

    /* ---------- 全屏 QR 码浮层 ---------- */
    #qrFullscreen{
        display:none;
        position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;
        background:rgba(0,0,0,0.88);
        z-index:9999;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:clamp(10px,2vh,20px);
        cursor:pointer;
        -webkit-tap-highlight-color:transparent;
        /* 入场动画 */
        animation:qrFadeIn 0.2s ease;
    }
    #qrFullscreen.active{display:flex}
    @keyframes qrFadeIn{from{opacity:0}to{opacity:1}}
    #qrFullCanvas{
        display:block;
        max-width:min(90vw,90dvh);
        max-height:min(90vw,90dvh);
        image-rendering:crisp-edges;
        /* 白色背景确保 QR 码可扫 */
        background:#fff;
        padding:clamp(6px,1.5vw,16px);
        border-radius:clamp(4px,1vw,12px);
        box-shadow:0 4px 24px rgba(0,0,0,0.3);
    }
    .fs-hint{
        color:rgba(255,255,255,0.55);
        font-size:clamp(12px,2.5vw,15px);
        pointer-events:none;
    }

    /* ========== 大屏幕 (> 768 CSS px) ========== */
    @media (min-width:769px){
        .card{gap:24px}
        .btn{min-width:140px;min-height:48px}
        .error-detail{max-height:min(25vh,25dvh,240px)}
    }
</style>
</head>
<body>

<div id="container">
    <div class="card">

        <!-- ====== 加载状态 ====== -->
        <div id="stateLoading" class="state-panel active">
            <div class="spinner-ring"></div>
            <div class="loading-title">正在获取二维码</div>
            <div class="loading-hint">请稍候，正在与微信客户端通信...</div>
            <div class="elapsed" id="elapsedTime">已等待 0 秒</div>
            <div class="quote" id="loadingQuote"></div>
        </div>

        <!-- ====== 成功状态 ====== -->
        <div id="stateSuccess" class="state-panel">
            <div id="qrCanvasWrap">
                <canvas id="qrcode"></canvas>
            </div>
            <div class="info-line" id="infoMechs">可用机台有「舞萌DX」和「中二节奏」</div>
            <div class="info-line" id="infoSpend">获取耗时 : --s</div>
            <div class="info-expiry" id="infoExpiry">有效期限 : --</div>
            <div class="btn-row">
                <a href="/logout" class="btn btn-secondary">退出登录</a>
                <button id="btnRefresh" class="btn btn-primary">刷新二维码</button>
            </div>
        </div>

        <!-- ====== 错误状态 ====== -->
        <div id="stateError" class="state-panel">
            <div class="error-icon">&#9888;</div>
            <div class="error-title">获取二维码失败</div>
            <div class="error-detail" id="errorMsg">未知错误</div>
            <div class="btn-row">
                <a href="/logout" class="btn btn-secondary">退出登录</a>
                <button id="btnRetry" class="btn btn-primary">重试</button>
            </div>
        </div>

    </div>
</div>

<!-- 全屏 QR 码浮层 -->
<div id="qrFullscreen">
    <canvas id="qrFullCanvas"></canvas>
    <div class="fs-hint">点击任意处关闭</div>
</div>

<script src="/static/js/qrcode.min.js"></script>
<script>
(function(){
    // ====== DOM ======
    var stateLoading = document.getElementById('stateLoading');
    var stateSuccess = document.getElementById('stateSuccess');
    var stateError   = document.getElementById('stateError');
    var elapsedEl    = document.getElementById('elapsedTime');
    var canvas       = document.getElementById('qrcode');
    var infoSpend    = document.getElementById('infoSpend');
    var infoExpiry   = document.getElementById('infoExpiry');
    var errorMsgEl   = document.getElementById('errorMsg');
    var btnRefresh   = document.getElementById('btnRefresh');
    var btnRetry     = document.getElementById('btnRetry');

    var elapsedTimer = null;
    var fetchStart   = 0;
    var currentMaid  = '';
    var loadingQuote = document.getElementById('loadingQuote');

    // ====== 随机语录库 ======
    var quotes = [
        '如果二维码扫不出来，试试调高手机屏幕亮度',
        '代理模式会比截屏模式平均快约 0.2 秒',
        '喜报：网络连接错误，将使用游客模式开始游戏',
        '使用内网穿透可以让你在任何地方获取二维码',
        '想不出来这里写什么了，欢迎提 PR（？）',
        '代理模式需要手动配置微信代理设置',
        '单击二维码可以放大，双击就可以快速重新获取',
        '修改默认登录入口和密码以提升安全性',
        '这个页面的背景色是 #d3d3d3',
        '获取失败更有可能是公众号的锅...',
        '感觉费劲部署这个项目也没方便到哪去...',
        '当前使用的账号没有正常登出，请过15分钟后再试'
    ];

    function pickQuote() {
        var i = Math.floor(Math.random() * quotes.length);
        loadingQuote.textContent = 'Tips: ' + quotes[i];
    }

    function showState(state) {
        stateLoading.classList.toggle('active', state === 'loading');
        stateSuccess.classList.toggle('active', state === 'success');
        stateError.classList.toggle('active',   state === 'error');
        // 进入加载态时随机选一条语录
        if (state === 'loading') pickQuote();
        // 切换状态后滚回顶部，确保用户看到完整内容
        document.getElementById('container').scrollTop = 0;
        // 错误详情区域也滚回顶部
        if (state === 'error') errorMsgEl.scrollTop = 0;
    }

    function startTimer() {
        stopTimer();
        fetchStart = Date.now();
        elapsedEl.textContent = '已等待 0 秒';
        elapsedTimer = setInterval(function(){
            var s = Math.round((Date.now() - fetchStart) / 1000);
            elapsedEl.textContent = '已等待 ' + s + ' 秒';
        }, 500);
    }

    function stopTimer() {
        if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
    }

    function calcQrSize() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var isLandscape = vw > vh;
        var isShort = vh < 400;
        if (isLandscape) {
            return Math.max(80, Math.min(400, Math.floor(Math.min(vh * 0.8, vw * 0.4))));
        }
        if (isShort) {
            // 矮屏：给文本+按钮留更多空间
            return Math.max(80, Math.min(400, Math.floor(Math.min(vw * 0.85, vh * 0.4))));
        }
        return Math.max(100, Math.min(500, Math.floor(Math.min(vw * 0.9, vh * 0.5))));
    }

    function renderQr(code) {
        QRCode.toCanvas(canvas, code, {
            width: calcQrSize(),
            margin: 2,
            errorCorrectionLevel: 'L'
        });
    }

    async function fetchQRCode() {
        showState('loading');
        startTimer();

        try {
            var resp = await fetch('/maimai', {
                headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
            });
            var data = await resp.json();
            stopTimer();

            if (data.success) {
                currentMaid = data.maid;
                renderQr(data.maid);
                infoSpend.textContent = '获取耗时 : ' + data.spend + 's';
                infoExpiry.textContent = '有效期限 : ' + data.time;
                showState('success');
            } else {
                errorMsgEl.textContent = data.error || '未能获取二维码，请稍后重试';
                showState('error');
            }
        } catch (e) {
            stopTimer();
            if (e.name === 'TypeError' && (e.message || '').indexOf('fetch') !== -1) {
                errorMsgEl.textContent = '网络连接失败，请检查网络后重试';
            } else {
                errorMsgEl.textContent = '请求异常: ' + (e.message || '未知错误');
            }
            showState('error');
        }
    }

    // ====== 按钮 ======
    btnRefresh.addEventListener('click', function(){
        this.textContent = '刷新中...';
        this.disabled = true;
        fetchQRCode().finally(function(){
            btnRefresh.textContent = '刷新二维码';
            btnRefresh.disabled = false;
        });
    });

    btnRetry.addEventListener('click', function(){
        this.textContent = '重试中...';
        this.disabled = true;
        fetchQRCode().finally(function(){
            btnRetry.textContent = '重试';
            btnRetry.disabled = false;
        });
    });

    // ====== 单击 QR 码：全屏放大 / 复原 ======
    var fullscreenOverlay = document.getElementById('qrFullscreen');
    var fullCanvas       = document.getElementById('qrFullCanvas');
    var isFullscreen     = false;
    var clickTimer       = null;

    function enterFullscreen() {
        if (!currentMaid) return;
        var size = Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.88);
        QRCode.toCanvas(fullCanvas, currentMaid, {
            width: size,
            margin: 2,
            errorCorrectionLevel: 'L'
        });
        fullscreenOverlay.classList.add('active');
        isFullscreen = true;
    }

    function exitFullscreen() {
        fullscreenOverlay.classList.remove('active');
        isFullscreen = false;
    }

    function toggleFullscreen() {
        isFullscreen ? exitFullscreen() : enterFullscreen();
    }

    // 单击 / 双击 分离：300ms 内第二次点击视为双击（刷新），否则切换全屏
    canvas.addEventListener('click', function(){
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
        clickTimer = setTimeout(function(){ clickTimer = null; toggleFullscreen(); }, 300);
    });

    canvas.addEventListener('dblclick', function(){
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
        fetchQRCode();
    });

    // 点击浮层任意位置关闭
    fullscreenOverlay.addEventListener('click', function(){ exitFullscreen(); });

    // Esc 键关闭全屏
    document.addEventListener('keydown', function(e){
        if (e.key === 'Escape' && isFullscreen) exitFullscreen();
    });

    // ====== resize 重新渲染 QR ======
    var resizeTimer;
    window.addEventListener('resize', function(){
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function(){
            if (stateSuccess.classList.contains('active') && currentMaid) {
                renderQr(currentMaid);
            }
        }, 150);
    });

    // ====== 启动 ======
    fetchQRCode();

    // ====== Service Worker 注册 ======
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){
            // 静默失败，不阻塞主流程
        });
    }
})();
</script>

</body>
</html>
